<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ '编辑图书' if edit else '添加图书' }} - 图书馆</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="padding-top:70px">
    {% include '_nav_admin.html' %}

    <div class="container mt-4">
        <h2>{{ '编辑图书' if edit else '添加新图书' }}</h2>

        <form method="POST" class="mt-3">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>ISBN *</label>
                    <input type="text" name="isbn" class="form-control" value="{{ book.isbn if book else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>书名 *</label>
                    <input type="text" name="title" class="form-control" value="{{ book.title if book else '' }}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>出版社</label>
                    <select name="publisher_id" class="form-select">
                        <option value="">-- 选择出版社 --</option>
                        {% for pub in publishers %}
                        <option value="{{ pub.id }}" {{ 'selected' if book and book.publisher_id == pub.id }}>{{ pub.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label>出版年份</label>
                    <input type="number" name="publish_year" class="form-control" value="{{ book.publish_year if book else '' }}" min="1000" max="2099">
                </div>
            </div>

            <div class="mb-3">
                <label>描述</label>
                <textarea name="description" class="form-control" rows="3">{{ book.description if book else '' }}</textarea>
            </div>

            <div class="mb-3">
                <label>作者</label>
                <input type="text" name="authors_input" class="form-control" 
                    value="{{ book.authors_str if book else '' }}"
                    placeholder="多个作者用逗号分隔，如：鲁迅, 莫言">
                <small class="text-muted">输入作者姓名，系统自动匹配已有作者或创建新作者</small>
            </div>

            <div class="mb-3">
                <label>分类</label>
                <div class="border rounded p-2" style="max-height:150px;overflow-y:auto;">
                    {% for c in categories %}
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" name="category_ids" value="{{ c.id }}" id="cat{{ c.id }}"
                            {{ 'checked' if book and c.id in book.category_ids }}>
                        <label class="form-check-label" for="cat{{ c.id }}">{{ c.name }}</label>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-primary">保存</button>
                <a href="{{ url_for('admin_books') }}" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
