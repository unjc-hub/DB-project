<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ '编辑学生' if student else '添加学生' }} - 图书馆</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="padding-top:70px">
    {% include '_nav_admin.html' %}

    <div class="container mt-4">
        <h2>{{ '编辑学生信息' if student else '添加新学生' }}</h2>

        <form method="POST" class="mt-3">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>学号 *</label>
                    <input type="text" name="student_no" class="form-control" value="{{ student.student_no if student else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>姓名 *</label>
                    <input type="text" name="name" class="form-control" value="{{ student.name if student else '' }}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>邮箱</label>
                    <input type="email" name="email" class="form-control" value="{{ student.email if student else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label>电话</label>
                    <input type="text" name="phone" class="form-control" value="{{ student.phone if student else '' }}">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label>入校时间（生效日期）</label>
                    <input type="date" name="enrollment_date" class="form-control" value="{{ student.enrollment_date if student else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label>毕业时间（失效日期）</label>
                    <input type="date" name="graduation_date" class="form-control" value="{{ student.graduation_date if student else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label>最大借阅册数</label>
                    <input type="number" name="max_borrow_limit" class="form-control" value="{{ student.max_borrow_limit if student else 30 }}" min="1" max="50">
                </div>
            </div>

            {% if student %}
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label>状态</label>
                    <select name="status" class="form-select">
                        <option value="active" {{ 'selected' if student.status == 'active' }}>正常</option>
                        <option value="suspended" {{ 'selected' if student.status == 'suspended' }}>停用</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label>最大借阅册数</label>
                    <input type="number" name="max_borrow_limit" class="form-control" value="{{ student.max_borrow_limit }}" min="1" max="50">
                </div>
                <div class="col-md-4 mb-3">
                    <label>{{ '新密码（留空不修改）' }}</label>
                    <input type="password" name="password" class="form-control" placeholder="留空则不修改密码">
                </div>
            </div>
            {% else %}
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label>密码 *</label>
                    <input type="password" name="password" class="form-control" required placeholder="至少6位">
                </div>
                <div class="col-md-4 mb-3">
                    <label>最大借阅册数</label>
                    <input type="number" name="max_borrow_limit" class="form-control" value="30" min="1" max="50">
                </div>
            </div>
            {% endif %}

            <div class="mb-3">
                <button type="submit" class="btn btn-primary">保存</button>
                <a href="{{ url_for('admin_students') }}" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
