<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 图书馆系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fb; min-height:100vh; }
        .login-card { border-radius:16px; border:none; box-shadow:0 4px 24px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <div class="container d-flex align-items-center justify-content-center" style="min-height:100vh">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card p-4">
                <div class="card-body">
                    <h3 class="text-center mb-4">用户登录</h3>
                    
                    {% with messages = get_flashed_messages() %}
                      {% if messages %}
                        {% for message in messages %}
                          <div class="alert alert-info alert-dismissible fade show py-2">{{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                          </div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">用户名 / 学号</label>
                            <input type="text" name="username" class="form-control" required autofocus placeholder="管理员用户名 / 学生学号">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">密码</label>
                            <input type="password" name="password" class="form-control" required placeholder="请输入密码">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">登 录</button>
                    </form>
                    <p class="text-center mt-3 mb-0">
                        <a href="{{ url_for('index') }}" class="text-muted small">返回首页</a>
                    </p>
                </div>
            </div>
            <p class="text-center text-muted small mt-3">学生使用学号登录 · 管理员使用用户名登录</p>
        </div>
    </div>
</body>
</html>
