<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>批量导入图书 - 图书馆</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="padding-top:70px">
    {% include '_nav_admin.html' %}

    <div class="container mt-4">
        <h2>批量导入图书 (CSV)</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-info">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="card mb-4">
            <div class="card-header">CSV 格式说明</div>
            <div class="card-body">
                <p>CSV 文件需包含以下列（UTF-8 编码）：</p>
                <code>ISBN,书名,作者,出版社,出版年</code>
                <p class="mt-2 text-muted small">示例：<br>9787020002207,呐喊,鲁迅,人民文学出版社,1923</p>
            </div>
        </div>

        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label>选择 CSV 文件</label>
                <input type="file" name="csv_file" class="form-control" accept=".csv" required>
            </div>
            <button type="submit" class="btn btn-primary">开始导入</button>
            <a href="{{ url_for('admin_books') }}" class="btn btn-secondary">返回</a>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
