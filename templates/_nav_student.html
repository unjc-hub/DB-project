<!-- 通用结果弹窗 -->
<div class="modal fade" id="resultModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content text-center border-0 shadow">
            <div class="modal-body py-4">
                <div class="fs-1 mb-2" id="resultIcon">✅</div>
                <h5 id="resultMsg">操作成功</h5>
            </div>
            <div class="modal-footer border-0 justify-content-center">
                <button type="button" class="btn btn-primary px-4 rounded-pill" data-bs-dismiss="modal">确定</button>
            </div>
        </div>
    </div>
</div>
<script>
window.showResult = function(ok, msg) {
    document.getElementById('resultIcon').textContent = ok ? '✅' : '❌';
    document.getElementById('resultMsg').textContent = msg;
    document.getElementById('resultMsg').className = ok ? 'text-success' : 'text-danger';
    new bootstrap.Modal(document.getElementById('resultModal')).show();
};
(function() {
    var alerts = document.querySelectorAll('.alert');
    alerts.forEach(function(a) {
        var t = a.textContent.trim();
        if (t.startsWith('_popup:')) {
            showResult(true, t.substring(7));
            a.remove();
        }
    });
})();
</script>
